name: Tests and release

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

env:
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test - ${{ matrix.os }}
    strategy:
      matrix:
        # No Windows: tests use unix-only APIs (PermissionsExt)
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # The EXIF test fixtures (tests/data/exif, ~430 MB) are stored in Git
      # LFS; without pulling them the checkout contains only pointer stubs
      # and every EXIF test fails. LFS objects are cached because GitHub
      # meters LFS bandwidth (1 GB/month on the free plan) — without the
      # cache two CI runs would exhaust the quota.
      - name: List LFS objects for cache key
        run: git lfs ls-files --long | cut -d ' ' -f1 | sort > .lfs-assets-id

      - name: Cache LFS objects
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-${{ hashFiles('.lfs-assets-id') }}

      - name: Pull LFS objects
        run: git lfs pull

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --locked

  release:
    name: Release - ${{ matrix.platform.release_for }}
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    permissions:
      contents: write
    strategy:
      matrix:
        platform:
          - release_for: Linux-x86_64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            bin: exif-sorter
            name: exif-sorter-Linux-x86_64-musl.tar.gz

          - release_for: Windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: exif-sorter.exe
            name: exif-sorter-Windows-x86_64.zip

          - release_for: macOS-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            bin: exif-sorter
            name: exif-sorter-Darwin-x86_64.tar.gz

          - release_for: macOS-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            bin: exif-sorter
            name: exif-sorter-Darwin-aarch64.tar.gz

    runs-on: ${{ matrix.platform.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build binary
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.platform.target }}
          args: "--locked --release"
          strip: true

      - name: Generate completions and man page
        shell: bash
        run: |
          BIN="target/${{ matrix.platform.target }}/release/${{ matrix.platform.bin }}"
          mkdir -p stage/completions
          cp "$BIN" LICENSE.md README.md stage/
          for sh in bash zsh fish powershell; do
            "$BIN" completions "$sh" > "stage/completions/exif-sorter.$sh"
          done
          "$BIN" manpage > stage/exif-sorter.1

      - name: Package as archive
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            7z a ${{ matrix.platform.name }} ./stage/*
          else
            tar czvf ${{ matrix.platform.name }} -C stage .
          fi

      - name: Generate SHA-256 checksum
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            shasum -a 256 ${{ matrix.platform.name }} > ${{ matrix.platform.name }}.sha256
          else
            sha256sum ${{ matrix.platform.name }} > ${{ matrix.platform.name }}.sha256
          fi

      # Curated release notes = the top (latest) section of CHANGELOG.md,
      # from its first "## " heading up to the next one.
      - name: Extract release notes from CHANGELOG
        shell: bash
        run: awk '/^## / {c++} c==1' CHANGELOG.md > RELEASE_BODY.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.platform.name }}
            ${{ matrix.platform.name }}.sha256
          # Curated notes for the tagged version, extracted from CHANGELOG.md,
          # with the auto-generated commit list appended after them.
          body_path: RELEASE_BODY.md
          append_body: true
          generate_release_notes: true

  # Native OS installers (.deb/.rpm/.dmg/.msi). Additive to the archives above.
  package:
    name: Package - ${{ matrix.platform.name }}
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux-x86_64
            os: ubuntu-22.04 # older glibc → runs on more distros
            packager_formats: deb
            rpm: true
          - name: macOS-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            packager_formats: dmg
          - name: macOS-x86_64
            os: macos-13 # Intel runner
            target: x86_64-apple-darwin
            packager_formats: dmg
          - name: Windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            packager_formats: wix # MSI
    runs-on: ${{ matrix.platform.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-packager
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-packager@0.11.6

      - name: Build release binary
        shell: bash
        run: |
          if [[ -n "${{ matrix.platform.target }}" ]]; then
            cargo build --locked --release --target ${{ matrix.platform.target }}
          else
            cargo build --locked --release
          fi

      # RPM (Linux only) is generated by cargo-generate-rpm from the built
      # binary plus the man page / completions generated here.
      - name: Generate man page and completions (for the rpm)
        if: matrix.platform.rpm
        run: |
          BIN=target/release/exif-sorter
          mkdir -p target/generated/completions
          "$BIN" manpage > target/generated/exif-sorter.1
          "$BIN" completions bash > target/generated/completions/exif-sorter.bash
          "$BIN" completions fish > target/generated/completions/exif-sorter.fish
          "$BIN" completions zsh  > target/generated/completions/_exif-sorter

      - name: Package (cargo-packager)
        shell: bash
        # Signing is read from the environment; unset ⇒ unsigned. Adding the
        # secrets later enables signing with no workflow change.
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          TARGET_FLAG=""
          if [[ -n "${{ matrix.platform.target }}" ]]; then
            TARGET_FLAG="--target ${{ matrix.platform.target }}"
          fi
          cargo packager --release $TARGET_FLAG \
            --formats ${{ matrix.platform.packager_formats }} \
            --out-dir dist

      - name: Package (rpm via cargo-generate-rpm)
        if: matrix.platform.rpm
        run: |
          cargo install cargo-generate-rpm --locked
          cargo generate-rpm --output dist/

      - name: Checksums and collect artifacts
        shell: bash
        run: |
          cd dist
          # keep only the installer artifacts, checksum each
          shopt -s nullglob
          for f in *.deb *.rpm *.dmg *.msi; do
            if [[ "${{ runner.os }}" == "macOS" ]]; then
              shasum -a 256 "$f" > "$f.sha256"
            else
              sha256sum "$f" > "$f.sha256"
            fi
          done
          ls -la

      - name: Publish to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/*.rpm
            dist/*.dmg
            dist/*.msi
            dist/*.sha256

  publish-crate:
    name: Publish to crates.io
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
